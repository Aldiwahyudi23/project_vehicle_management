# Di openapi.yaml atau di komponen schemas
VehicleBrand:
  type: object
  required:
    - id
    - name
  properties:
    id:
      type: integer
      example: 1
    name:
      type: string
      example: "Toyota"
    country:
      type: string
      example: "Jepang"
    is_active:
      type: boolean
      example: true
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time